<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none" role="img" aria-label="VCR Records">
  <!-- Globe -->
  <ellipse cx="140" cy="88" rx="108" ry="72" stroke="#1d1d1f" stroke-width="2.5"/>
  <ellipse cx="140" cy="88" rx="102" ry="67" stroke="#1d1d1f" stroke-width="1"/>
  <!-- Latitude -->
  <ellipse cx="140" cy="88" rx="108" ry="22" stroke="#1d1d1f" stroke-width="1.4"/>
  <path d="M36 68 C80 58, 200 58, 244 68" stroke="#1d1d1f" stroke-width="1" opacity=".55"/>
  <path d="M36 108 C80 118, 200 118, 244 108" stroke="#1d1d1f" stroke-width="1" opacity=".55"/>
  <!-- Longitude -->
  <ellipse cx="140" cy="88" rx="36" ry="72" stroke="#1d1d1f" stroke-width="1.3"/>
  <ellipse cx="140" cy="88" rx="72" ry="72" stroke="#1d1d1f" stroke-width="1.1" opacity=".7"/>
  <line x1="140" y1="16" x2="140" y2="160" stroke="#1d1d1f" stroke-width="1.2"/>
  <!-- VCR knockout bar -->
  <rect x="58" y="70" width="164" height="36" fill="#fff"/>
  <text x="140" y="98" text-anchor="middle" font-family="Manrope, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="0.06em" fill="#1d1d1f">VCR</text>
  <!-- RECORDS -->
  <text x="140" y="186" text-anchor="middle" font-family="Manrope, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="0.42em" fill="#1d1d1f">RECORDS</text>
</svg>
